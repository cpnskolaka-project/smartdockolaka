<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartDoc Kolaka — Sistem Utilitas Digital untuk KPP Pratama Kolaka. Konversi dokumen, edit PDF, optimasi gambar, dan tools produktivitas lainnya.">
    <meta name="theme-color" content="#273c66">
    <title>{% block title %}SmartDoc Kolaka{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/local-icons.css') }}">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="logo">
                <img src="{{ url_for('static', filename='images/kppkolakalogobnw.png') }}" alt="SmartDoc Kolaka" class="nav-logo">
            </a>
        </div>
        <div class="sidebar-nav">
            {% for cat in tool_categories %}
            <div class="nav-category">
                <button class="nav-category-btn" onclick="toggleCategory(this)">
                    <i class="bi {{ cat.icon }}"></i> <span data-i18n-text="cat.{{ cat.id }}">{{ cat.name }}</span>
                    <i class="bi bi-chevron-down chevron"></i>
                </button>
                <div class="nav-items">
                    {% for tool in cat.tools %}
                    <a href="/{{ cat.id }}/{{ tool.id }}" class="nav-item">
                        <i class="bi {{ tool.icon }}"></i> <span data-i18n-text="tool.{{ cat.id }}.{{ tool.id }}">{{ tool.name }}</span>
                    </a>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        <div class="sidebar-footer" style="padding: 1rem; border-top: 1px solid var(--border); margin-top: auto; display: flex; flex-direction: column; gap: 0.5rem;">
            <a href="{{ url_for('favorites') }}" class="nav-item" id="nav-favorites-btn">
                <i class="bi bi-star"></i> <span data-i18n-text="nav.favorites">Favorit & Recent</span>
            </a>
            <a href="{{ url_for('history') }}" class="nav-item" id="nav-history-btn">
                <i class="bi bi-clock-history"></i> <span data-i18n-text="nav.history">Riwayat Log</span>
            </a>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 0.2rem 0;">
            <button id="theme-toggle" class="btn btn-small" style="width: 100%; justify-content: center; border: 1px solid var(--border);" onclick="toggleTheme()" aria-label="Toggle Theme">
                <i class="bi bi-moon-fill" id="theme-icon"></i> <span data-i18n-text="nav.toggle_theme">Toggle Theme</span>
            </button>
            <button id="lang-toggle" class="btn btn-small" style="width: 100%; justify-content: center; border: 1px solid var(--border);" onclick="toggleLanguage()" aria-label="Toggle Language">
                <i class="bi bi-translate"></i> <span data-i18n-text="nav.switch_lang">Indonesia</span>
            </button>
        </div>
    </nav>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="main-content">
        <header class="top-bar desktop-hide">
            <button class="menu-btn" onclick="openSidebar()"><i class="bi bi-list"></i></button>
            <span class="top-title">{% block top_title %}SmartDoc Kolaka{% endblock %}</span>
        </header>
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
