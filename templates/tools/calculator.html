{% extends "base.html" %}
{% block title %}Calculator - SmartDoc Kolaka{% endblock %}
{% block top_title %}Calculator{% endblock %}

{% block content %}
<div class="client-tool" style="max-width:360px">
    <div class="tool-header">
        <h1 data-i18n-text="tool.calc.calculator">Calculator</h1>
        <p data-i18n-text="desc.calc.calculator">Basic and scientific calculator</p>
    </div>
    <div class="calc-display">
        <div class="calc-expression" id="calc-expr">&nbsp;</div>
        <div class="calc-result" id="calc-result">0</div>
    </div>
    <div class="calc-grid">
        <button class="calc-btn" onclick="clearCalc()">C</button>
        <button class="calc-btn" onclick="backspace()"><i class="bi bi-backspace"></i></button>
        <button class="calc-btn op" onclick="appendOp('%')">%</button>
        <button class="calc-btn op" onclick="appendOp('/')">÷</button>

        <button class="calc-btn" onclick="appendNum('7')">7</button>
        <button class="calc-btn" onclick="appendNum('8')">8</button>
        <button class="calc-btn" onclick="appendNum('9')">9</button>
        <button class="calc-btn op" onclick="appendOp('*')">×</button>

        <button class="calc-btn" onclick="appendNum('4')">4</button>
        <button class="calc-btn" onclick="appendNum('5')">5</button>
        <button class="calc-btn" onclick="appendNum('6')">6</button>
        <button class="calc-btn op" onclick="appendOp('-')">−</button>

        <button class="calc-btn" onclick="appendNum('1')">1</button>
        <button class="calc-btn" onclick="appendNum('2')">2</button>
        <button class="calc-btn" onclick="appendNum('3')">3</button>
        <button class="calc-btn op" onclick="appendOp('+')">+</button>

        <button class="calc-btn" onclick="appendNum('.')">.</button>
        <button class="calc-btn" onclick="appendNum('0')">0</button>
        <button class="calc-btn eq span2" onclick="calculate()">=</button>
    </div>
    <div class="calc-grid" style="margin-top:.5rem;grid-template-columns:repeat(5,1fr)">
        <button class="calc-btn op" onclick="sciOp('sqrt')">√</button>
        <button class="calc-btn op" onclick="sciOp('pow2')">x²</button>
        <button class="calc-btn op" onclick="sciOp('inv')">1/x</button>
        <button class="calc-btn op" onclick="sciOp('sin')">sin</button>
        <button class="calc-btn op" onclick="sciOp('cos')">cos</button>
        <button class="calc-btn op" onclick="sciOp('tan')">tan</button>
        <button class="calc-btn op" onclick="sciOp('log')">log</button>
        <button class="calc-btn op" onclick="sciOp('ln')">ln</button>
        <button class="calc-btn op" onclick="appendNum(Math.PI.toFixed(8))">π</button>
        <button class="calc-btn op" onclick="appendNum(Math.E.toFixed(8))">e</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Raw values for calculation (uses "." as decimal separator internally)
let expression = "";    // e.g. "12345 + 678 * "
let currentNum = "0";   // e.g. "12345.67"
let lastResult = null;

/**
 * Format a raw number string for display with Indonesian locale:
 * - Dot (.) as thousands separator
 * - Comma (,) as decimal separator
 * e.g. "12345.67" → "12.345,67", "-50000" → "-50.000"
 */
function formatDisplayNum(raw) {
    if (raw === "Error" || raw === "" || raw === "-") return raw;

    // Handle negative
    let negative = false;
    let str = raw;
    if (str.startsWith("-")) {
        negative = true;
        str = str.substring(1);
    }

    // Split integer and decimal parts
    let parts = str.split(".");
    let intPart = parts[0] || "0";
    let decPart = parts.length > 1 ? parts[1] : null;

    // Add thousands separators to integer part
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

    let result = (negative ? "-" : "") + intPart;
    if (decPart !== null) {
        result += "," + decPart;
    }
    return result;
}

/**
 * Format the expression string for display.
 * Converts raw numbers in the expression to formatted display,
 * and uses proper math symbols.
 */
function formatExpression(expr) {
    if (!expr) return "\u00a0";

    // Map operators to display symbols
    const opMap = { "/": " ÷ ", "*": " × ", "-": " − ", "+": " + ", "%": " % " };

    // Split expression into tokens (numbers and operators)
    // Expression format: "123 + 456 * 789 = " or "123 + 456 * "
    let tokens = expr.split(" ");
    return tokens.map(token => {
        if (token === "=") return "=";
        if (["+", "-", "*", "/", "%"].includes(token)) return opMap[token] || token;
        // It's a number — format it
        if (token !== "" && !isNaN(parseFloat(token))) {
            return formatDisplayNum(token);
        }
        return token;
    }).join("");
}

function updateDisplay() {
    document.getElementById("calc-expr").innerHTML = formatExpression(expression) || "\u00a0";
    document.getElementById("calc-result").textContent = formatDisplayNum(currentNum);
}

function appendNum(n) {
    if (lastResult !== null) { expression = ""; lastResult = null; }

    if (n === ".") {
        // Prevent multiple decimal points
        if (currentNum.includes(".")) return;
        currentNum += ".";
    } else if (currentNum === "0") {
        currentNum = n;
    } else {
        currentNum += n;
    }
    updateDisplay();
}

function appendOp(op) {
    if (lastResult !== null) {
        expression = currentNum + " " + op + " ";
        currentNum = "0";
        lastResult = null;
    } else {
        expression += currentNum + " " + op + " ";
        currentNum = "0";
    }
    updateDisplay();
}

function calculate() {
    const expr = expression + currentNum;
    try {
        // Safe evaluation using Function constructor
        let sanitized = expr.replace(/[^0-9+\-*/.%() ]/g, "");
        let result = Function('"use strict"; return (' + sanitized + ')')();
        if (!isFinite(result)) throw new Error("Invalid");
        expression = expr + " =";
        currentNum = parseFloat(result.toPrecision(12)).toString();
        lastResult = currentNum;
    } catch {
        currentNum = "Error";
        lastResult = null;
    }
    updateDisplay();
}

function clearCalc() {
    expression = ""; currentNum = "0"; lastResult = null;
    updateDisplay();
}

function backspace() {
    if (currentNum === "Error") { currentNum = "0"; updateDisplay(); return; }
    if (currentNum.length > 1) currentNum = currentNum.slice(0, -1);
    else currentNum = "0";
    // Clean up trailing dot: if user deletes the digit after ".", remove the dot too
    if (currentNum.endsWith(".")) currentNum = currentNum.slice(0, -1) || "0";
    updateDisplay();
}

function sciOp(op) {
    let val = parseFloat(currentNum);
    switch (op) {
        case "sqrt": val = Math.sqrt(val); break;
        case "pow2": val = val * val; break;
        case "inv": val = 1 / val; break;
        case "sin": val = Math.sin(val * Math.PI / 180); break;
        case "cos": val = Math.cos(val * Math.PI / 180); break;
        case "tan": val = Math.tan(val * Math.PI / 180); break;
        case "log": val = Math.log10(val); break;
        case "ln": val = Math.log(val); break;
    }
    currentNum = isFinite(val) ? parseFloat(val.toPrecision(12)).toString() : "Error";
    updateDisplay();
}

document.addEventListener("keydown", e => {
    // Skip if user is focused on search or other input
    if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;

    if (e.key >= "0" && e.key <= "9" || e.key === ".") appendNum(e.key);
    else if (["+", "-", "*", "/", "%"].includes(e.key)) appendOp(e.key);
    else if (e.key === "Enter" || e.key === "=") calculate();
    else if (e.key === "Backspace") backspace();
    else if (e.key === "Escape") clearCalc();
});
</script>
{% endblock %}
